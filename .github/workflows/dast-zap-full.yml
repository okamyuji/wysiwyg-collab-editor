name: dast-zap-full

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  zap-full:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: zap full scan
        run: |
          docker run --rm \
            -v "$PWD/zap:/zap/wrk" \
            -t ghcr.io/zaproxy/zaproxy:2.17.0 \
            zap-full-scan.py -t "${{ secrets.STAGING_URL }}" -r zap-full.html -J zap-full.json -I
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-full-report
          path: zap
