apiVersion: apps/v1
kind: Deployment
metadata:
  name: export-worker
  namespace: wysiwyg-collab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: export-worker
  template:
    metadata:
      labels:
        app: export-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: export-worker
          image: ghcr.io/your-org/wysiwyg-export-worker:REPLACE_WITH_IMAGE_TAG
          envFrom:
            - configMapRef:
                name: app-server-config
            - secretRef:
                name: app-server-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
