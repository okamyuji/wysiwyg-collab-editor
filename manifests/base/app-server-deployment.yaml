apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-server
  namespace: wysiwyg-collab
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: app-server
  template:
    metadata:
      labels:
        app: app-server
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app-server
          image: ghcr.io/your-org/wysiwyg-app-server:REPLACE_WITH_IMAGE_TAG
          ports:
            - name: http
              containerPort: 3000
            - name: metrics
              containerPort: 9100
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: app-server-config
            - secretRef:
                name: app-server-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
